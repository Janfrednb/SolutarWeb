<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solutar - Mapa de Estandarización</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        solutarRojo: '#E31E24',
                        solutarNegro: '#050505',
                        solutarGris: '#111111',
                        solutarBorde: '#222222',
                    }
                }
            }
        }
    </script>
    <style>
        select option { background-color: white !important; color: black !important; }
    </style>
</head>
<body class="bg-solutarNegro text-white font-sans antialiased pb-20">

    <nav class="bg-solutarNegro border-b border-solutarBorde sticky top-0 z-40 shadow-lg">
        <div class="max-w-7xl mx-auto px-6 py-3 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="logoSolutar.png" alt="Logo Solutar" class="h-12 object-contain">
                <div class="hidden md:block border-l border-solutarBorde pl-4">
                    <span class="text-sm font-bold text-gray-400">Portal de Cliente</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-bold">Cliente Demo S.A.S</p>
                    <p class="text-xs text-green-500"><i class="fa-solid fa-circle text-[8px] relative -top-[1px]"></i> Sistema Activo</p>
                </div>
                <button onclick="cerrarSesion()" class="bg-solutarRojo/10 text-solutarRojo hover:bg-solutarRojo hover:text-white px-4 py-2 rounded transition-colors text-sm font-bold">
                    Salir
                </button>
            </div>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-6 mt-10 mb-8">
        <h1 class="text-3xl font-black mb-2 uppercase tracking-wide">Mapa de Estandarización</h1>
        <p class="text-gray-400 text-sm">Control y trazabilidad de equipos y tareas de alto riesgo.</p>
    </header>

    <main class="max-w-7xl mx-auto px-6">
        
        <div class="bg-solutarGris border border-solutarBorde rounded-xl p-5 mb-8 shadow-lg">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1 relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-gray-500"></i>
                    <input type="text" id="buscadorCliente" onkeyup="filtrarTablaCliente()" placeholder="Buscar por Serial, Marca o Tipo..." class="w-full bg-solutarNegro border border-solutarBorde rounded-lg pl-11 pr-4 py-3 text-sm text-white focus:border-solutarRojo outline-none transition-colors">
                </div>
                <div class="md:w-48">
                    <select id="filtroEstado" onchange="filtrarTablaCliente()" class="w-full bg-solutarNegro border border-solutarBorde rounded-lg px-4 py-3 text-sm text-white focus:border-solutarRojo outline-none transition-colors cursor-pointer">
                        <option value="" class="text-black">Todos los Estados</option>
                        <option value="APROBADO" class="text-black">Aprobados</option>
                        <option value="MANTENIMIENTO" class="text-black">En Mantenimiento</option>
                        <option value="RECHAZADO" class="text-black">Rechazados</option>
                    </select>
                </div>
                <div class="md:w-56">
                    <select id="filtroTipo" onchange="filtrarTablaCliente()" class="w-full bg-solutarNegro border border-solutarBorde rounded-lg px-4 py-3 text-sm text-white focus:border-solutarRojo outline-none transition-colors cursor-pointer">
                        <option value="" class="text-black">Todos los Equipos</option>
                        <option value="Arnés" class="text-black">Arneses</option>
                        <option value="Eslinga" class="text-black">Eslingas</option>
                        <option value="Punto de Anclaje" class="text-black">Puntos de Anclaje</option>
                        <option value="Línea de Vida" class="text-black">Líneas de Vida</option>
                        <option value="Mosquetón" class="text-black">Mosquetones</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="bg-solutarGris border border-solutarBorde rounded-xl overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-solutarNegro text-gray-400 text-xs uppercase tracking-widest">
                            <th class="p-4 border-b border-solutarBorde">ID / Serial</th>
                            <th class="p-4 border-b border-solutarBorde">Equipo y Marca</th>
                            <th class="p-4 border-b border-solutarBorde">Inspector</th>
                            <th class="p-4 border-b border-solutarBorde">Estado Actual</th>
                            <th class="p-4 border-b border-solutarBorde text-center">Documento Legal</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTablaCliente">
                        <tr>
                            <td colspan="5" class="p-10 text-center text-gray-500 italic">
                                <i class="fa-solid fa-spinner fa-spin mr-2"></i> Cargando base de datos segura...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        window.cerrarSesion = () => window.location.href = "index.html";

        // Función que filtra la tabla en tiempo real en la pantalla del cliente
        window.filtrarTablaCliente = () => {
            const busqueda = document.getElementById('buscadorCliente').value.toUpperCase();
            const estado = document.getElementById('filtroEstado').value.toUpperCase();
            const tipo = document.getElementById('filtroTipo').value.toUpperCase();
            
            const filas = document.getElementById('cuerpoTablaCliente').getElementsByTagName('tr');

            for (let fila of filas) {
                // Evitar filtrar la fila de "Cargando..." o si la tabla está vacía
                if (fila.cells.length < 5) continue;

                const textoSerial = fila.cells[0].textContent.toUpperCase();
                const textoEquipoMarca = fila.cells[1].textContent.toUpperCase();
                const textoEstado = fila.cells[3].textContent.toUpperCase();
                
                // Unimos serial, tipo y marca para que el buscador encuentre cualquiera de los 3
                const textoCompleto = textoSerial + " " + textoEquipoMarca;

                const coincideBusqueda = textoCompleto.includes(busqueda);
                const coincideEstado = estado === "" || textoEstado.includes(estado);
                const coincideTipo = tipo === "" || textoEquipoMarca.includes(tipo);

                if (coincideBusqueda && coincideEstado && coincideTipo) {
                    fila.style.display = "";
                } else {
                    fila.style.display = "none";
                }
            }
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, onSnapshot, orderBy, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // 🚨 PEGA TUS LLAVES DE FIREBASE AQUÍ 🚨
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDif_whhHFTQvtBsXW4sKerHlCafSXKgPA",
            authDomain: "solutar-gestion.firebaseapp.com",
            projectId: "solutar-gestion",
            storageBucket: "solutar-gestion.firebasestorage.app",
            messagingSenderId: "472091356051",
            appId: "1:472091356051:web:9ddeda6a8aece01ec19666"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tablaBody = document.getElementById("cuerpoTablaCliente");

        // CARGAR DATOS EN TIEMPO REAL DESDE LA V2
        const q = query(collection(db, "actas_inspeccion_v2"), orderBy("fecha_registro", "desc"));
        
        onSnapshot(q, (snapshot) => {
            tablaBody.innerHTML = "";
            if (snapshot.empty) {
                tablaBody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-gray-500">No hay equipos registrados aún.</td></tr>`;
                return;
            }

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const fila = document.createElement("tr");
                fila.className = "hover:bg-solutarBorde/30 transition-colors border-b border-solutarBorde";

                // Veredictos
                let colorDictamen = "bg-yellow-900/30 text-yellow-400 border-yellow-800";
                if(data.dictamen_final === "CONFORME" || data.dictamen_final === "CONFORME CON OBSERVACION") colorDictamen = "bg-green-900/30 text-green-400 border-green-800";
                if(data.dictamen_final === "NO CONFORME" || data.dictamen_final === "NO CONFORME, VIDA UTIL SUPERADA") colorDictamen = "bg-red-900/30 text-red-400 border-red-800";

                fila.innerHTML = `
                    <td class="p-4 font-mono text-solutarRojo font-bold">${data.equipo.serial || 'S/N'}</td>
                    <td class="p-4">
                        <p class="font-bold text-sm text-white">${data.equipo.tipo}</p>
                        <p class="text-xs text-gray-500">${data.equipo.fabricante} - ${data.cliente}</p>
                    </td>
                    <td class="p-4 text-xs text-gray-400">${data.inspector}</td>
                    <td class="p-4">
                        <span class="${colorDictamen} border px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider">
                            ${data.dictamen_final.substring(0,25)}...
                        </span>
                    </td>
                    <td class="p-4 text-center">
                        <button onclick="descargarPDF('${docSnap.id}')" class="text-xs bg-solutarRojo text-white hover:bg-red-700 font-bold py-2 px-4 rounded transition-colors shadow-lg shadow-red-900/20">
                            Descargar Acta <i class="fa-solid fa-file-pdf ml-1"></i>
                        </button>
                    </td>
                `;
                tablaBody.appendChild(fila);
            });
            window.filtrarTablaCliente();
        });

        const imageToBase64 = (src) => {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'Anonymous'; 
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.height = img.naturalHeight;
                    canvas.width = img.naturalWidth;
                    ctx.drawImage(img, 0, 0);
                    resolve(canvas.toDataURL('image/png'));
                };
                img.onerror = error => reject(error);
                img.src = src;
            });
        };

        window.descargarPDF = async (idDocumento) => {
            const docRef = doc(db, "actas_inspeccion_v2", idDocumento);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF();

                try {
                    const logoBase64 = await imageToBase64('logoSolutar.png');
                    pdf.addImage(logoBase64, 'PNG', 15, 10, 35, 35);
                    
                    pdf.setTextColor(0, 0, 0);
                    pdf.setFontSize(16);
                    pdf.setFont("helvetica", "bold");
                    pdf.text("SOLUTAR S.A.S", 60, 20);
                    pdf.setFontSize(9);
                    pdf.setFont("helvetica", "normal");
                    pdf.text("Soluciones en Tareas de Alto Riesgo / Críticas", 60, 26);
                    
                    pdf.setFontSize(11);
                    pdf.setFont("helvetica", "bold");
                    pdf.text("ACTA DE PRE-INSPECCIÓN TÉCNICA DE EQUIPOS", 60, 38);
                    pdf.line(60, 40, 195, 40);

                    // DATOS GENERALES
                    pdf.setFontSize(9);
                    pdf.text(`Cliente/Empresa: ${data.cliente}`, 15, 50);
                    pdf.text(`Proyecto/Sede: ${data.trazabilidad.proyecto}`, 15, 55);
                    pdf.text(`Inspector: ${data.inspector}`, 15, 60);
                    pdf.text(`Fecha Inspección: ${data.trazabilidad.fecha_inspeccion}`, 130, 50);
                    pdf.text(`Tipo Inspección: ${data.trazabilidad.tipo_inspeccion.substring(0, 30)}`, 130, 55);

                    // TABLA EQUIPO
                    pdf.autoTable({
                        startY: 65,
                        theme: 'striped',
                        head: [['Identificación del Equipo', 'Detalles']],
                        body: [
                            ['Fabricante', data.equipo.fabricante],
                            ['Tipo de Equipo', data.equipo.tipo],
                            ['Serial / Lote', `${data.equipo.serial} / ${data.equipo.lote || 'N/A'}`],
                            ['Referencia / Cód. Interno', `${data.equipo.referencia || 'N/A'} / ${data.equipo.codigo_interno || 'N/A'}`],
                            ['Fecha Fab. / Año', `${data.equipo.fecha_fab || 'N/A'} - ${data.equipo.anio_fab || 'N/A'}`],
                            ['Estado de Vida Útil', data.equipo.estado_vida || 'N/A']
                        ],
                        headStyles: { fillColor: [227, 30, 36] },
                        styles: { fontSize: 8 }
                    });

                    // TABLA EVALUACIÓN (Resumen de las 37 preguntas)
                    pdf.autoTable({
                        startY: pdf.lastAutoTable.finalY + 10,
                        theme: 'grid',
                        head: [['Componente', 'Estado', 'Hallazgos / Plan de Acción']],
                        body: [
                            ['Etiquetas e Info.', data.evaluacion.etiquetas.estado, data.evaluacion.etiquetas.hallazgo],
                            ['Textiles/Cintas', data.evaluacion.textiles.estado, data.evaluacion.textiles.hallazgo],
                            ['Costuras', data.evaluacion.costuras.estado, data.evaluacion.costuras.hallazgo],
                            ['Partes Metálicas', data.evaluacion.metalicos.estado, data.evaluacion.metalicos.hallazgo],
                            ['Partes Móviles', data.evaluacion.moviles.estado, data.evaluacion.moviles.hallazgo],
                            ['Plásticos/Recub.', data.evaluacion.plasticos.estado, data.evaluacion.plasticos.hallazgo]
                        ],
                        headStyles: { fillColor: [5, 5, 5] },
                        styles: { fontSize: 8 }
                    });

                    // DICTAMEN FINAL
                    const finalY = pdf.lastAutoTable.finalY + 15;
                    pdf.setFontSize(12);
                    pdf.setFont("helvetica", "bold");
                    pdf.text("DICTAMEN FINAL:", 15, finalY);
                    
                    let colorDictamen = [200, 150, 0]; // Amarillo
                    if(data.dictamen_final.includes("CONFORME") && !data.dictamen_final.includes("NO CONFORME")) colorDictamen = [0, 128, 0]; // Verde
                    if(data.dictamen_final.includes("NO CONFORME")) colorDictamen = [227, 30, 36]; // Rojo
                    
                    pdf.setTextColor(colorDictamen[0], colorDictamen[1], colorDictamen[2]);
                    pdf.text(data.dictamen_final, 55, finalY, { maxWidth: 140 });

                    // FIRMAS
                    pdf.setTextColor(0, 0, 0);
                    pdf.line(15, 270, 80, 270);
                    pdf.setFontSize(9);
                    pdf.text(`Firma Inspector (${data.inspector})`, 15, 275);
                    pdf.line(130, 270, 195, 270);
                    pdf.text("Recibido por Cliente", 130, 275);

                    pdf.save(`Acta_Solutar_${data.equipo.serial}.pdf`);

                } catch (error) {
                    console.error("Error PDF:", error);
                    alert("Error al generar PDF.");
                }
            }
        };
    </script>
</body>
</html>
