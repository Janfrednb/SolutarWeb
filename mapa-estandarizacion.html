<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario de Equipos - Solutar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { 
                burgundy: '#881C23', solutarRojo: '#E31E24', mist: '#F4F6F5', 
                blancoPuro: '#FFFFFF', slate: '#4E5861', subtleBlack: '#25272A', bordeClaro: '#DDE2E1' 
            }}}
        }
    </script>
</head>
<body class="bg-mist text-slate font-sans antialiased h-screen flex overflow-hidden">

    <aside class="w-64 bg-slate text-mist flex flex-col justify-between hidden md:flex border-r border-slate shadow-xl z-20">
        <div>
            <div class="p-6 border-b border-subtleBlack/20 flex justify-center bg-blancoPuro">
                <img src="logoSolutar.png" alt="Solutar Logo" class="h-16 object-contain">
            </div>
            <div class="p-6">
                <p class="text-xs font-bold text-white/50 uppercase tracking-widest mb-4">Módulos</p>
                <nav class="space-y-2">
                    <a href="mapa-estandarizacion.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-mist text-solutarRojo font-bold border border-subtleBlack/10 shadow-sm transition-all">
                        <i class="fa-solid fa-clipboard-check"></i> Inventario de Equipos
                    </a>
                    <a href="var-sst.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-mist/90 hover:bg-white/10 hover:text-white transition-all">
                        <i class="fa-solid fa-tv"></i> VAR SST (Riesgos)
                    </a>
                    <a href="actas-documentos.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-mist/90 hover:bg-white/10 hover:text-white transition-all">
                        <i class="fa-solid fa-file-pdf"></i> Actas y Documentos
                    </a>
                </nav>
            </div>
        </div>
        <div class="p-6 border-t border-subtleBlack/20 bg-black/10">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 rounded-full bg-blancoPuro flex items-center justify-center text-slate font-black"><i class="fa-solid fa-building"></i></div>
                <div>
                    <p class="text-sm font-bold text-white leading-tight">Cliente VIP</p>
                    <p class="text-xs text-mist/50">Sesión Activa</p>
                </div>
            </div>
            <button onclick="window.location.href='index.html'" class="w-full py-2 text-sm text-center text-mist/50 hover:text-white transition-colors">
                <i class="fa-solid fa-right-from-bracket mr-1"></i> Cerrar Sesión
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto bg-mist">
        
        <header class="bg-blancoPuro border-b border-bordeClaro py-4 px-8 flex flex-col md:flex-row justify-between items-center sticky top-0 z-10 shadow-sm gap-4">
            <div>
                <h1 class="text-2xl font-black text-subtleBlack uppercase tracking-tight">Inventario de Equipos</h1>
                <p class="text-sm text-slate font-medium">Control Operacional Solutar</p>
            </div>
            <div class="flex items-center gap-4 w-full md:w-auto">
                <div class="relative w-full md:w-64">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate/40"></i>
                    <input type="text" id="buscador" placeholder="Buscar serial o marca..." class="w-full border border-bordeClaro rounded-lg pl-10 pr-4 py-2 text-sm focus:outline-none focus:border-solutarRojo shadow-inner bg-mist/50">
                </div>
                <button onclick="window.location.href='formulario-inspeccion.html'" class="bg-solutarRojo hover:bg-red-700 text-white font-bold py-2.5 px-5 rounded-lg shadow-[0_4px_10px_rgba(227,30,36,0.3)] transition-all text-sm flex items-center gap-2 whitespace-nowrap">
                    <i class="fa-solid fa-plus"></i> Nuevo Registro
                </button>
            </div>
        </header>

        <div class="p-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="bg-blancoPuro border border-bordeClaro p-6 rounded-2xl shadow-sm border-l-4 border-l-burgundy">
                    <p class="text-slate text-sm font-bold uppercase mb-1">Total Equipos</p>
                    <p class="text-3xl font-black text-subtleBlack" id="countTotal">0</p>
                </div>
                <div class="bg-blancoPuro border border-bordeClaro p-6 rounded-2xl shadow-sm border
